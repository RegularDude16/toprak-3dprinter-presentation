<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Yazıcılar Nasıl Çalışır? - Toprak</title>
    <style>
        /* Türkçe desteği %100 kusursuz, yuvarlak hatlı, eğlenceli ve okunaklı font: Nunito */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

        body {
            font-family: 'Nunito', 'Comic Sans MS', sans-serif;
            background-color: #dcb883; 
            background-image: 
                radial-gradient(#c49e66 10%, transparent 11%),
                radial-gradient(#c49e66 10%, transparent 11%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #2f3542;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 3.5rem;
            color: #ff4757;
            text-shadow: 3px 3px 0 #2f3542, -2px -2px 0 #2f3542, 2px -2px 0 #2f3542, -2px 2px 0 #2f3542, 2px 2px 0 #2f3542;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .header p {
            background: #ffffff;
            display: inline-block;
            padding: 8px 20px;
            border: 3px solid #2f3542;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #3742fa;
            box-shadow: 4px 4px 0px #2f3542;
            transform: rotate(-1deg);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .thumb {
            background-color: #ffffff;
            border: 4px solid #2f3542;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 6px 6px 0px #2f3542;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 150px;
            transform: rotate(-1deg);
        }

        .thumb:nth-child(even) {
            transform: rotate(2deg);
        }

        .thumb:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 8px 8px 0px #2f3542;
        }

        .thumb:nth-child(1) h3 { color: #ff4757; } 
        .thumb:nth-child(2) h3 { color: #1e90ff; } 
        .thumb:nth-child(3) h3 { color: #2ed573; } 
        .thumb:nth-child(4) h3 { color: #ffa502; } 
        .thumb:nth-child(5) h3 { color: #9c88ff; } 
        .thumb:nth-child(6) h3 { color: #ff6b81; } 
        .thumb:nth-child(7) h3 { color: #00d2d3; } 

        .thumb h3 {
            margin: 0 0 10px 0;
            font-size: 1.6rem;
            text-shadow: 1px 1px 0px #2f3542;
            font-weight: 800;
        }

        .thumb-icon {
            font-size: 2.5rem;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(47, 53, 66, 0.9);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: #fff9e6;
            width: 80vw;
            height: 85vh;
            border: 6px solid #2f3542;
            border-radius: 20px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
            padding: 70px 40px 40px 40px; 
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto; 
            background-image: radial-gradient(#ffeaa7 15%, transparent 16%);
            background-size: 20px 20px;
        }

        .close-btn {
            position: absolute; 
            top: 20px;
            right: 25px;
            font-size: 55px;
            color: #ff4757;
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.2s;
            line-height: 1;
            text-shadow: 2px 2px 0px #2f3542;
            z-index: 10; 
        }

        .close-btn:hover {
            transform: scale(1.1) rotate(10deg);
            color: #ff6b81;
        }

        /* --- YÖN BUTONLARI (İLERİ/GERİ) --- */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background-color: #3742fa;
            color: white;
            border: 4px solid #2f3542;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 30px;
            font-weight: 900;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 4px 4px 0px #2f3542;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: #535cfa;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        #modalBody {
            margin: auto 0; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slide-data {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-in;
        }

        .modal-content h2 {
            font-size: 3.2rem;
            color: #3742fa;
            text-shadow: 2px 2px 0px #2f3542;
            margin-top: 0;
            margin-bottom: 30px;
            background: white;
            padding: 10px 20px;
            border: 3px solid #2f3542;
            border-radius: 15px;
            transform: rotate(-1deg);
            display: inline-block;
            font-weight: 800;
        }

        .content-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
        }

        .image-box {
            flex: 1; 
            height: 45vh;
            background-color: #ffffff;
            border: 5px dashed #ffa502;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 5px 5px 0px #2f3542;
            transform: rotate(1deg);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        .text-box {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .text-box p, .text-box ul {
            font-size: 1.8rem;
            line-height: 1.6;
            background: white;
            padding: 25px 30px;
            border: 3px solid #2f3542;
            border-radius: 15px;
            box-shadow: 4px 4px 0px rgba(47, 53, 66, 0.2);
            margin: 0;
            text-align: left;
            box-sizing: border-box;
            font-weight: 700;
        }

        .text-box ul {
            padding-left: 50px;
        }

        .text-box li {
            margin-bottom: 12px;
        }

        .text-box li:last-child {
            margin-bottom: 0;
        }

        @keyframes popIn {
            from { transform: scale(0.7) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- DİKEY MOBİL AYARLARI --- */
        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .header p { font-size: 1rem; }
            .modal-content {
                width: 100vw;
                height: 100vh; 
                border-radius: 0;
                border: none;
                padding: 60px 15px 100px 15px; 
            }
            .modal-content h2 { font-size: 2rem; margin-bottom: 20px; }
            
            .content-wrapper {
                flex-direction: column;
                gap: 20px;
            }
            .image-box {
                width: 100%; 
                height: 35vh;
            }
            .text-box { width: 100%; }
            .text-box p, .text-box ul {
                font-size: 1.4rem;
                padding: 15px 20px;
            }
            .close-btn {
                top: 15px;
                right: 20px;
                font-size: 45px;
            }
            
            .nav-btn {
                top: auto;
                bottom: 20px;
                transform: none;
                width: 55px;
                height: 55px;
                font-size: 24px;
            }
            .nav-btn:hover {
                transform: scale(1.1);
            }
            .prev-btn { left: 20px; }
            .next-btn { right: 20px; }
        }

        /* --- YATAY MOBİL OPTİMİZASYONU --- */
        @media (max-height: 550px) {
            .modal-content {
                height: 100vh;
                width: 100vw;
                border-radius: 0;
                border: none;
                padding: 50px 20px 20px 20px;
                justify-content: flex-start; 
            }
            #modalBody { margin: 0; }
            .modal-content h2 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
            .content-wrapper {
                flex-direction: row;
                gap: 20px;
            }
            .image-box { height: 60vh; }
            .text-box p, .text-box ul {
                font-size: 1.2rem;
                padding: 15px;
            }
            .close-btn {
                top: 10px;
                right: 20px;
                font-size: 40px;
            }
            .nav-btn {
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>3D YAZICILAR NASIL ÇALIŞIR?</h1>
        <p>Büyütmek için kutucuklara tıkla! 🚀</p>
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div id="myModal" class="modal">
        <button class="nav-btn prev-btn" onclick="changeSlide(-1)" title="Önceki Slayt">&#10094;</button>
        <button class="nav-btn next-btn" onclick="changeSlide(1)" title="Sonraki Slayt">&#10095;</button>

        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()" title="Kapat">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <template id="slidesTemplate">
        
        <div class="slide-data" data-title="1. Kapak" data-emoji="🌟">
            <h2>3D Yazıcılar Nasıl Çalışır?</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/1.jpg" alt="3D Yazıcı">
                </div>
                <div class="text-box">
                    <p><strong>Hazırlayan: Toprak</strong> 👦🏻</p>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="2. Nedir?" data-emoji="🤔">
            <h2>3D Yazıcı Nedir?</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/2.jpg" alt="3D Model">
                </div>
                <div class="text-box">
                    <p>Bilgisayarda çizdiğimiz dijital tasarımları, dokunabildiğimiz gerçek nesnelere dönüştüren sihirli kutulardır.</p>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="3. Tasarım" data-emoji="💻">
            <h2>1. Adım: Hayal Et ve Çiz!</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/3.jpg" alt="3D Tasarım Programı">
                </div>
                <div class="text-box">
                    <p>Her şey bilgisayarda bir 3D çizim ile başlar. Bunun için özel modelleme programları kullanılır.</p>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="4. Dilimleme" data-emoji="🍰">
            <h2>2. Adım: Dilimleme (Slicing)</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/4.jpg" alt="3D Dilimleme Yazılımı">
                </div>
                <div class="text-box">
                    <p>Yazıcılar nesneleri tek seferde değil, <strong>katman katman</strong> inşa eder. Modeli bilgisayarda ince dilimlere ayırırız.</p>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="5. Baskı" data-emoji="⚙️">
            <h2>3. Adım: Üretim Başlıyor</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/5.jpg" alt="3D Yazıcı Ucu (Nozzle)">
                </div>
                <div class="text-box">
                    <ul>
                        <li>Plastik ip (filament) ısıtılarak eritilir. 🔥</li>
                        <li>Sıcak uç (nozul) erimiş plastiği masaya sürer.</li>
                        <li>Plastik anında soğur ve nesne yükselir. 🏗️</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="6. Örnekler" data-emoji="🚀">
            <h2>Neler Üretebiliriz?</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/6.jpg" alt="3D Baskı Oyuncaklar">
                </div>
                <div class="text-box">
                    <p>Sınır hayal gücümüz! Oyuncaklar, robotlar, bozulan eşya parçaları ve hatta medikal protezler basılabilir.</p>
                </div>
            </div>
        </div>

        <div class="slide-data" data-title="7. Teşekkürler" data-emoji="🎉">
            <h2>Beni Dinlediğiniz İçin Teşekkürler!</h2>
            <div class="content-wrapper">
                <div class="image-box">
                    <img src="sunumResimler/7.jpg" alt="Eğlenceli 3D Baskı Obje">
                </div>
                <div class="text-box">
                    <p><strong>Sorularınız var mı?</strong> 🙋‍♂️</p>
                </div>
            </div>
        </div>

    </template>

    <script>
        const template = document.getElementById('slidesTemplate');
        const slides = template.content.querySelectorAll('.slide-data');
        const grid = document.getElementById('grid');
        const modal = document.getElementById('myModal');
        const modalBody = document.getElementById('modalBody');
        
        let currentSlideIndex = 0; 

        slides.forEach((slide, index) => {
            const thumbBox = document.createElement('div');
            thumbBox.className = 'thumb';
            
            const title = document.createElement('h3');
            title.textContent = slide.getAttribute('data-title');
            
            const icon = document.createElement('div');
            icon.className = 'thumb-icon';
            icon.innerHTML = slide.getAttribute('data-emoji');

            thumbBox.appendChild(title);
            thumbBox.appendChild(icon);

            thumbBox.onclick = () => openModal(index);
            grid.appendChild(thumbBox);
        });

        function renderSlide(index) {
            modalBody.innerHTML = '';
            const slideContent = slides[index].cloneNode(true);
            modalBody.appendChild(slideContent);
            
            const modalContentBox = document.querySelector('.modal-content');
            if (modalContentBox) modalContentBox.scrollTop = 0;
        }

        function openModal(index) {
            currentSlideIndex = index;
            renderSlide(currentSlideIndex);
            modal.style.display = 'flex';
            
            if (!history.state || !history.state.modalOpen) {
                history.pushState({ modalOpen: true }, "");
            }
        }

        function changeSlide(direction) {
            modalBody.innerHTML = '';
            
            setTimeout(() => {
                currentSlideIndex += direction;
                
                if (currentSlideIndex < 0) {
                    currentSlideIndex = slides.length - 1;
                } else if (currentSlideIndex >= slides.length) {
                    currentSlideIndex = 0;
                }
                
                renderSlide(currentSlideIndex);
            }, 50); 
        }

        function closeModal() {
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
                if (history.state && history.state.modalOpen) {
                    history.back();
                }
            }
        }

        window.addEventListener('popstate', function(event) {
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            }
        });

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
        
        document.addEventListener('keydown', (event) => {
            if (modal.style.display === 'flex') {
                if (event.key === 'Escape') closeModal();
                else if (event.key === 'ArrowLeft') changeSlide(-1);
                else if (event.key === 'ArrowRight') changeSlide(1);
            }
        });
    </script>
</body>
</html>
